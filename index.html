<!DOCTYPE html>
<!-- index.html — Entry Point
     Immediately redirects the browser to login.html via a meta refresh.
     This file exists so that visiting the root URL of the application
     (e.g. http://localhost/Hostel_Management_System/) goes straight to
     the login page instead of showing a directory listing or 404.
-->
<html>
    <head>
        <meta http-equiv="refresh" content="0;url=login.html">
    </head>
</html>
